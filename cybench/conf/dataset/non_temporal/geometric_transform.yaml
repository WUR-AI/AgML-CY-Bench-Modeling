name: geo_transform

sources:
  crop_calendar:
    select:
      - sos
      - eos
    transform:
      - type: cyclical
        feature: sos
        period: 365
      - type: cyclical
        feature: eos
        period: 365

  location:
    select:
      - latitude
      - longitude
    transform:
      - type: spherical
        lat: latitude
        lon: longitude

  soil:
    select:
      - awc
      - bulk_density
      - drainage_class
    transform:
      - type: dummy
        feature: drainage_class
        classes: [1, 2, 3, 4, 5, 6]
