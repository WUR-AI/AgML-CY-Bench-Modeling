# Normalization types only - parameters will be fitted from data
name: fit

features:
  year:
    type: minmax
    params:
      min: 2000
      max: 2025

  # phenology
  sos:
    type: standard
    params: null
  eos:
    type: standard
    params: null

  # location
  latitude:
    type: standard
    params: null
  longitude:
    type: standard
    params: null

  # soil
  awc:
    type: standard
    params: null
  bulk_density:
    type: standard
    params: null
  drainage_class:
    type: standard
    params: null   # categorical-but-numeric; encode earlier

  # meteo
  tmin:
    type: standard
    params: null
  tmax:
    type: standard
    params: null
  tavg:
    type: standard
    params: null
  rad:
    type: standard
    params: null

  prec:
    type: logsinh
  et0:
    type: logsinh
  vpd:
    type: logsinh
  cwb:
    type: logsinh

  # vegetation
  ndvi:
    type: standard
    params: null
  fpar:
    type: standard
    params: null

  # soil moisture
  ssm:
    type: standard
    params: null
  rsm:
    type: standard
    params: null

  # aggregated features
  tmin_min:
    type: standard
    params: null
  tmax_max:
    type: standard
    params: null
  tavg_mean:
    type: standard
    params: null
  rad_mean:
    type: standard
    params: null
  et0_mean:
    type: standard
    params: null
  vpd_mean:
    type: standard
    params: null
  cwb_mean:
    type: standard
    params: null
  gdd_sum:
    type: standard
    params: null
  cum_gdd_max:
    type: standard
    params: null
  cum_prec_max:
    type: standard
    params: null
  cum_cwb_mean:
    type: standard
    params: null
  prec_sum:
    type: standard
    params: null
  prec_max:
    type: standard
    params: null
  ndvi_mean:
    type: standard
    params: null
  cum_ndvi_max:
    type: standard
    params: null
  fpar_mean:
    type: standard
    params: null
  cum_fpar_max:
    type: standard
    params: null
  ssm_mean:
    type: standard
    params: null
  rsm_mean:
    type: standard
    params: null
