defaults:
  - dataset: default
  - model: cnn_lf
  #- hp_search: bayesian
  - validation: rolling
  - evaluation: default
  - _self_

# -------------------------------
# Experiment-level configuration
# -------------------------------
# Represents a grouping of related runs.
# All runs within an experiment share the same device, random seed,
# and global settings. Use this to define high-level properties.
experiment:
  name: baselines
  device: cuda
  preload_to_device: true
  seed: 42
  n_jobs: 1 # gets passed to optuna to parallelize hp-search | n_jobs=-1 recommended for cpu modeling
  n_repetitions: 5 # number of final model trainings to assess the stability of model given different seeds
  results_dir: ../output/${experiment.name}

# determine which files and objects to store
# Note: especially torch models tend to be large and may overload storage
store:
  train_preds: false
  model: false
  meta: false
  # Paper-oriented defaults: predictions + metrics per split; skip duplicate exports.
  export_root_csv: false        # wide CSV at Hydra run root (duplicate of test_preds.csv)
  save_split_configs: false     # per-split model_config.yaml + selected_features.yaml
  save_screening_partitions: true  # small audit file for screening splits only
  save_hpo_search_space: false  # Optuna search_space.yaml (optimal_model.yaml is kept)

run:
  name: ${dataset.name}_${model.name}_${validation.name}_${prediction_horizon_tag:${dataset.temporal.season.end_of_sequence}}_${now:%Y%m%d_%H%M%S}

# -------------------------------
# Hydra-specific configuration
# -------------------------------
# Defines how Hydra manages logs, configs, and working directories.
hydra:
  run:
    dir: ../output/${experiment.name}/${run.name}

  sweep:
    dir: ../output/${experiment.name}
    subdir: ${run.name}
  #output_subdir: null
  job:
    chdir: true