_target_: cybench.models.lpjml_model.LpjmlBiasCorrectedModel
name: lpjml_bc
framework: pandas

# rainfed | irrigated
variant: rainfed

# Per-location calibration falls back to global training moments when:
# - fewer than min_location_years overlap with LPJmL, or
# - local LPJmL std (sigma_P) is below min_std_mod.
min_location_years: 5
min_std_mod: 0.1

# Optional override for LPJmL CSV root (default: cybench.config.PATH_DATA_DIR)
# data_dir: /path/to/cybench/data
