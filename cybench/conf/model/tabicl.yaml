_target_: cybench.models.tabular_foundation_model.TabICLModel
name: tabicl
framework: pandas

device: auto
predict_batch_size: 256
allow_cpu_fallback: true
max_train_samples: null
preprocess: none
subsample: random
subsample_bins: 10
random_state: ${experiment.seed}
verbose: false

# forwarded to tabicl.TabICLRegressor
n_estimators: 8

_search_:
  n_estimators:
    type: int
    low: 4
    high: 16
    step: 4
