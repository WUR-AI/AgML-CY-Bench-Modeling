_target_: path_to.XGBRegressor
name: xgboost

# default parameter
n_estimators: 100
max_depth: 6
learning_rate: 0.3
subsample: 1.0
colsample_bytree: 1.0
colsample_bylevel: 1.0
min_child_weight: 1
gamma: 0
reg_alpha: 0
reg_lambda: 1
random_state: ${experiment.seed}
n_jobs: -1
tree_method: auto

# parameter range for hyperparameter optimization
_search_space:
  n_estimators:
    type: int
    low: 50
    high: 500
    step: 50
  max_depth:
    type: int
    low: 2
    high: 20
    step: 2
  learning_rate:
    type: float
    low: 0.001
    high: 0.3
    log: true
  subsample:
    type: float
    low: 0.5
    high: 1.0
  colsample_bytree:
    type: float
    low: 0.5
    high: 1.0
  colsample_bylevel:
    type: float
    low: 0.5
    high: 1.0
  min_child_weight:
    type: int
    low: 1
    high: 10
  gamma:
    type: float
    low: 0
    high: 5
  reg_alpha:
    type: float
    low: 1e-9
    high: 10
    log: true
  reg_lambda:
    type: float
    low: 1e-9
    high: 10
    log: true