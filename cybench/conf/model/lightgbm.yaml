_target_: lightgbm.LGBMRegressor
name: lightgbm

# default parameter
n_estimators: 500
max_depth: -1
learning_rate: 0.1
num_leaves: 31
subsample: 1.0
subsample_freq: 0
colsample_bytree: 1.0
min_child_samples: 20
min_child_weight: 0.001
reg_alpha: 0
reg_lambda: 0
random_state: ${experiment.seed}
n_jobs: -1
verbose: -1

# parameter range for hyperparameter optimization
_search_space:
  n_estimators:
    type: int
    low: 50
    high: 1000
    step: 50
  max_depth:
    type: int
    low: 2
    high: 20
    step: 2
  learning_rate:
    type: float
    low: 0.001
    high: 0.3
    log: true
  num_leaves:
    type: int
    low: 20
    high: 150
  subsample:
    type: float
    low: 0.5
    high: 1.0
  subsample_freq:
    type: int
    low: 0
    high: 10
  colsample_bytree:
    type: float
    low: 0.5
    high: 1.0
  min_child_samples:
    type: int
    low: 5
    high: 100
  min_child_weight:
    type: float
    low: 0.0001
    high: 10
    log: true
  reg_alpha:
    type: float
    low: 1e-9
    high: 10
    log: true
  reg_lambda:
    type: float
    low: 1e-9
    high: 10
    log: true