_target_: cybench.models.sklearn_models.Ridge
name: ridge
framework: pandas

# default parameters (forwarded to sklearn Ridge)
alpha: 1.0
fit_intercept: true
solver: auto
max_iter: null
tol: 0.0001

# parameter range for hyperparameter optimization
_search_:
  alpha:
    type: float
    low: 1e-9
    high: 100.0
    log: true
