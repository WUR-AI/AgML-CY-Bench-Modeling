_target_: cybench.models.torch.model_components.temporal_encoder.CNNProcessor

# embed_dim is usually tied to the model's main embedding size.
# Replace ${model.embed_dim} with whatever your config uses.
embed_dim: ${model.torch_model.embed_dim}

num_layers: 4        # number of Conv1d layers
kernel_size: 3       # temporal kernel size (odd to keep length with padding)
dropout: 0.4         # dropout between conv layers