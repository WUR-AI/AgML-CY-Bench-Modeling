_target_: cybench.models.torch.model_components.temporal_encoder.TransformerProcessor

embed_dim: ${model.torch_model.embed_dim}

num_layers: 1       # number of TransformerEncoder layers
nhead: 4             # attention heads
dim_feedforward: ${model.torch_model.embed_dim} # FFN hidden size
dropout: 0.2

_search_:
  dropout:
    type: float
    low: .0
    high: .8
  num_layers:
    type: int
    low: 1
    high: 4
  nhead:
    type: int
    low: 4
    high: 8
    step: 4