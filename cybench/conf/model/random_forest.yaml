_target_: cybench.models.sklearn_models.RandomForest
name: random_forest
framework: pandas

# default parameters (forwarded to sklearn RandomForestRegressor)
n_estimators: 100
max_depth: null
min_samples_split: 2
min_samples_leaf: 1
max_features: 1.0
bootstrap: true
max_samples: null
n_jobs: -1

# parameter range for hyperparameter optimization
_search_:
  n_estimators:
    type: int
    low: 50
    high: 500
    step: 50
  max_depth:
    type: int
    low: 3
    high: 20
  min_samples_split:
    type: int
    low: 2
    high: 20
  min_samples_leaf:
    type: int
    low: 1
    high: 10
  max_features:
    type: categorical
    choices: [0.3, 0.5, 0.7, 1.0, sqrt, log2]
  max_samples:
    type: categorical
    choices: [null, 0.5, 0.7, 0.9]
