# This validation procedure takes a single set of train and test samples
# Perfect for testing expensive model architectures, since it requires only a single run
# Note! The current implementation always assumes that after seperating test and val years ALL remaining datapoints go into training.

name: single

# Specify methods for both train/test (validation of methode) and train/val (used for hyperparameter search or early stopping)
# Options:
#   [y1, y2]  - pick list of years
#   xx%-split - randomly selects xx% of the years for the validation set
#   k-last    - takes the k last years into val set

# By default, take the last 3 dataset years as test years and similarly for the val years
test_years: 3-last
val_years: 3-last
