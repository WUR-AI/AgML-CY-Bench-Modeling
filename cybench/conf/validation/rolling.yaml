# This validation procedure takes a set of test years and trains models for each of them given the past years
# Perfect for testing general forecasting ability, since it simulates out-of-distribution modeling for the temporal dimension

name: rolling

# By default, take the last 3 dataset years as test years.
# You may also provide an explicit list, e.g., [2018, 2019, 2020].
test_years: 3-last

# set a methode for train/val split for hyperparameter search | will be ignored if hp_search==none
# Options:
#   xx%-split - randomly selects xx% of the years for the validation set
#   k-last    - takes the k last years into val set
#   k-fold-cv - randomly puts each year into one of k bins to perform CV
#   loyocv    - full leave-one-year-out-CV
val_years: 3-last
