# This validation procedure takes a set of test years and trains models for each of them given only past years
# Perfect for testing general forecasting ability, since it simulates out-of-distribution modeling for the temporal dimension
# Note! The current implementation always assumes that ALL available past datapoints go into training.

name: rolling

# Specify methods for both train/test (validation of methode) and train/val (used for hyperparameter search or early stopping)
# Options:
#   [y1, y2]  - pick list of years
#   xx%-split - randomly selects xx% of the years for the validation set
#   k-last    - takes the k last years into val set

# By default, take the last 3 dataset years as test years and similarly for the val years
test_years: 5-last
val_years: 3-last
