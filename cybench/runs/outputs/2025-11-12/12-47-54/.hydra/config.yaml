dataset:
  crop: wheat
  country: NL
  name: ${dataset.crop}_${dataset.country}
  min_year: 2000
  max_year: 2023
  target:
    name: yield
    transform: null
    residualize: null
  non_temporal:
    name: no_transform
    sources:
      crop_calendar:
        features:
        - sos
        - eos
      location:
        features:
        - latitude
        - longitude
      soil:
        features:
        - awc
        - bulk_density
        - drainage_class
  temporal:
    name: aggregate
    season:
      end_of_sequence: eos-60
      start_of_sequence: sos-60
    aggregate: 60
    sources:
      meteo:
        name: meteo
        features:
        - tmin
        - tmax
        - tavg
        - prec
        - rad
        - et0
        - vpd
        - cwb
        agg_function:
          tmin: min
          tmax: max
          tavg: mean
          prec:
          - sum
          - max
          rad: mean
          et0: mean
          vpd: mean
          cwb: mean
      ndvi:
        name: ndvi
        features:
        - ndvi
        agg_function:
          ndvi: mean
      fpar:
        name: fpar
        features:
        - fpar
        agg_function:
          fpar: mean
      soil_moisture:
        name: soil_moisture
        features:
        - ssm
        - rsm
        agg_function:
          ssm: mean
          rsm: mean
  framework: pandas
model:
  _target_: sklearn.linear_model.Ridge
  name: ridge
  alpha: 1.0
  fit_intercept: true
  solver: auto
  max_iter: null
  tol: 0.0001
  random_state: ${experiment.seed}
  _search_space:
    alpha:
      type: float
      low: 1.0e-09
      high: 100.0
      log: true
evaluation:
  name: default
  metrics:
  - mape
  - normalized_rmse
  - r
  - r2
  residual: false
validation:
  name: rolling
  test_years: 3-last
  val_years: 3-last
hp_search:
  study_name: bayesian_tpe_search
  n_trials: 200
  timeout: 14400
  n_jobs: ${experiment.n_jobs}
  sampler:
    _target_: optuna.samplers.TPESampler
    seed: ${experiment.seed}
    n_startup_trials: 20
    n_ei_candidates: 24
    multivariate: true
    warn_independent_sampling: true
    constant_liar: true
  storage:
    url: sqlite:///optuna_studies.db
    load_if_exists: true
  logging:
    log_interval: 5
    show_progress_bar: true
    verbose: true
experiment:
  name: hello_cy_bench
  device: cpu
  seed: 42
  n_jobs: 1
  results_dir: ../output/${experiment.name}
run:
  name: ${dataset.name}_${model.name}_${validation.name}_${now:%Y%m%d_%H%M}
